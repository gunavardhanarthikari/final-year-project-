<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Management - TrueFace AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="container">
        <nav class="navbar glass-panel">
            <div class="brand">
                <ion-icon name="scan-outline"></ion-icon>
                TrueFace AI
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">
                    <ion-icon name="home-outline"></ion-icon> Home
                </a>
                <a href="history.html" class="nav-link">
                    <ion-icon name="time-outline"></ion-icon> History
                </a>
                <a href="admin.html" class="nav-link active">
                    <ion-icon name="people-outline"></ion-icon> Database
                </a>
            </div>
        </nav>

        <div class="results-container">
            <!-- Add Face Form -->
            <div class="glass-panel" style="padding: 2rem;">
                <h2 style="margin-bottom: 1.5rem;">Add New Person</h2>

                <form id="add-face-form" style="display: flex; flex-direction: column; gap: 1.5rem;">
                    <div style="background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 1rem;">
                        <input type="file" id="face-image" accept="image/*" class="file-input" style="width: 100%;">
                    </div>

                    <div>
                        <label style="color: var(--text-muted); font-size: 0.9rem;">Person ID</label>
                        <input type="text" id="person-name" placeholder="E.g., USER_001"
                            style="width: 100%; padding: 1rem; background: rgba(0,0,0,0.2); border: 1px solid var(--surface-glass-border); color: white; border-radius: 0.5rem; margin-top: 0.5rem;">
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <ion-icon name="add-circle-outline"></ion-icon> Add to Database
                    </button>
                    <div id="upload-status" style="text-align: center;"></div>
                </form>
            </div>

            <!-- Face List -->
            <div class="glass-panel" style="padding: 2rem;">
                <h2 style="margin-bottom: 1.5rem;">Registered Faces</h2>
                <div id="faces-list" class="detections-list">
                    <!-- Faces injected by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Modal -->
    <div id="delete-modal" class="processing-overlay" style="display: none;">
        <div class="glass-panel" style="padding: 2rem; max-width: 400px; text-align: center;">
            <ion-icon name="warning-outline" style="font-size: 3rem; color: var(--error);"></ion-icon>
            <h2 style="margin: 1rem 0;">Confirm Deletion</h2>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Are you sure you want to delete this face from the
                database?</p>
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button id="cancel-delete" class="btn btn-secondary">Cancel</button>
                <button id="confirm-delete" class="btn btn-primary" style="background: var(--error);">Delete</button>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>

</html>
