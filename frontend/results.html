<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Results - TrueFace AI</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="container">
        <!-- Navigation -->
        <!-- Navigation (Standardized) -->
        <nav class="navbar">
            <div class="brand">TrueFace AI</div>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="history.html" class="nav-link">History</a></li>
                <li data-role="ADMIN"><a href="admin.html" class="nav-link">Admin</a></li>
                <li style="margin-left: 1rem; border-left: 1px solid var(--border); padding-left: 1rem;">
                    <span id="user-display" class="text-muted" style="font-size: 0.8rem; font-weight: 600;"></span>
                </li>
                <li><a href="#" id="logout-link" class="nav-link logout">Logout</a></li>
            </ul>
        </nav>

        <!-- Stats Bar (Minimalist) -->
        <div class="home-grid stats-grid" style="margin-bottom: 2rem;">
            <div class="stark-box stat-card">
                <p class="text-muted" style="font-size: 0.8rem; text-transform: uppercase;">Faces Found</p>
                <div class="stat-value" id="totalFaces">0</div>
            </div>
            <div class="stark-box stat-card">
                <p class="text-muted" style="font-size: 0.8rem; text-transform: uppercase;">Matches</p>
                <div class="stat-value" id="matchedFaces">0</div>
            </div>
            <div class="stark-box stat-card">
                <p class="text-muted" style="font-size: 0.8rem; text-transform: uppercase;">Process Time</p>
                <div class="stat-value" id="processingTime">0s</div>
            </div>
        </div>

        <div class="results-layout">
            <!-- Visual Result -->
            <div class="stark-box" id="annotatedImageContainer" style="padding: 0; position: sticky; top: 5rem;">
                <img id="result-image" src="" alt="Analyzed Result"
                    style="width: 100%; border-radius: var(--radius); display: block;">
            </div>

            <!-- Data Result -->
            <div id="data-column">
                <h3 style="margin-bottom: 1.5rem; border-bottom: 2px solid black; padding-bottom: 0.5rem;">Identified
                    Individuals</h3>
                <div id="detections-list">
                    <!-- Premium cards injected by JS -->
                </div>

                <div id="noResults" style="display: none; text-align: center; padding: 3rem 1rem;" class="stark-box">
                    <p class="text-muted">No faces were detected in this file.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Enrollment Modal (Hidden by default) -->
    <div id="enrollment-modal" class="processing-overlay" style="display: none; background: rgba(255,255,255,0.9);">
        <div class="stark-box auth-form" style="box-shadow: 0 20px 50px rgba(0,0,0,0.1);">
            <h3>Enroll New Face</h3>
            <p class="text-muted" style="font-size: 0.8rem; margin-bottom: 2rem;">Add this detection to the permanent
                database.</p>

            <div class="form-group">
                <label>Person Name</label>
                <input type="text" id="modal-person-name" class="form-input" placeholder="e.g. Unknown Person">
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button id="btn-cancel-enroll" class="btn btn-secondary" style="flex: 1;">Cancel</button>
                <button id="btn-confirm-enroll" class="btn btn-primary" style="flex: 1;">Save to DB</button>
            </div>
        </div>
    </div>

    <!-- Processing Overlay -->
    <div id="processing-overlay" class="processing-overlay">
        <div
            style="border: 4px solid #eee; border-top: 4px solid black; width: 40px; height: 40px; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 1.5rem;">
        </div>
        <h3>Working...</h3>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/results.js"></script>
    <script>
        document.getElementById('logout-link').onclick = (e) => {
            e.preventDefault();
            auth.logout();
        };
    </script>
</body>

</html>
